<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Eaglercraft Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #e0e0e0;
        }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
        }

        .auth-box {
            border: 4px solid #fff;
            padding: 40px;
            width: 320px;
            text-align: center;
            box-shadow: 10px 10px 0px #333;
            background: #111;
        }

        .auth-box h1 {
            color: #4aff9e;
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #fff;
            background: #222;
            color: #fff;
            font-weight: bold;
            outline: none;
            box-sizing: border-box;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .os-btn {
            background: #fff;
            color: #000;
            border: 2px solid #fff;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .os-btn:hover {
            background: #4aff9e;
            border-color: #4aff9e;
        }

        /* Launcher Container */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .launcher-box {
            background: rgba(18, 25, 45, 0.95);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #2a4c7a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            color: #4aff9e;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #88aacc;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .version-selector {
            margin-bottom: 30px;
        }

        label {
            display: block;
            color: #aaffdd;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1rem;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #0a0f1e;
            border: 1px solid #2a4c7a;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            text-align: center;
        }

        .launch-btn {
            width: 100%;
            padding: 14px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .launch-btn:hover {
            background: #1b5e20;
            transform: scale(1.02);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #556688;
        }

        /* User Bar */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f1422;
            border: 1px solid #2a4c7a;
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }

        .rank-tag {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 20px;
            background: #1a2a3a;
        }

        .rank-owner {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            color: #000;
            font-weight: bold;
        }
        .rank-admin { background: #ff4757; color: #fff; }
        .rank-vip { background: #1e90ff; color: #fff; }

        .logout-btn {
            background: #2c3e50;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .logout-btn:hover {
            background: #e74c3c;
        }

        /* Download Section */
        .download-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2a4c7a;
        }

        .download-btn {
            display: inline-block;
            background: #1e3a5f;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .download-btn:hover {
            background: #4aff9e;
            color: #0a0f1e;
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="auth-overlay">
        <div class="auth-box">
            <h1>EAGLERCRAFT<br>LAUNCHER</h1>
            <input type="text" id="login-id" placeholder="NICKNAME OR EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <div class="btn-row">
                <button class="os-btn" style="flex:1;" onclick="handleAuth('login')">SIGN IN</button>
                <button class="os-btn" style="flex:1;" onclick="handleAuth('signup')">SIGN UP</button>
            </div>
            <button class="os-btn" style="width:100%; margin-top:10px; font-size:9px; background:#444;" onclick="sendResetEmail()">FORGOT PASSWORD?</button>
        </div>
    </div>

    <!-- LAUNCHER SCREEN -->
    <div id="launcher-screen" style="display:none;">
        <div class="container">
            <!-- User Bar -->
            <div class="user-bar">
                <div class="user-info">
                    <span>👤</span>
                    <span id="user-nickname" style="font-weight:bold;">Loading...</span>
                    <span id="rank-badge" class="rank-tag">[MEMBER]</span>
                </div>
                <button class="logout-btn" onclick="logout()">LOGOUT</button>
            </div>

            <!-- Launcher Box -->
            <div class="launcher-box">
                <h1>🎮 Eaglercraft Launcher</h1>
                <div class="subtitle">Select a version and click Launch</div>

                <div class="version-selector">
                    <label>📦 Select Version</label>
                    <select id="version">
                        <option value="game_1.12.html">1.12.2 (Latest)</option>
                        <option value="game_1.8.html">1.8.8</option>
                        <option value="game_1.5.html">1.5.2</option>
                        <option value="game_beta.html">Beta</option>
                        <option value="game_alpha.html">Alpha</option>
                        <option value="game_indev.html">Indev</option>
                    </select>
                </div>

                <button class="launch-btn" onclick="launchGame()">🚀 LAUNCH GAME</button>

                <!-- Download Section -->
                <div class="download-section">
                    <a href="#" id="downloadLauncherLink" class="download-btn" download>📥 Download Launcher (ZIP)</a>
                    <p style="font-size: 0.7rem; color: #556688; margin-top: 10px;">
                        Instructions: Download, extract, then keep launcher in the same folder as game files.
                    </p>
                </div>

                <div class="footer">
                    💾 All versions work offline • Just double-click to play • Made by The_GamerZ
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Firebase configuration (same as GamerZ OS)
        const firebaseConfig = {
            apiKey: "AIzaSyD0Pl0zqyHVP1zfXm2ZLalrmLU1glP6U-0",
            authDomain: "gamerz-os.firebaseapp.com",
            projectId: "gamerz-os",
            storageBucket: "gamerz-os.firebasestorage.app",
            messagingSenderId: "477372507172",
            appId: "1:477372507172:web:836936398b86901c1b64b1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUserData = {};

        // Handle login/signup
        function handleAuth(mode) {
            const id = document.getElementById('login-id').value.trim();
            const password = document.getElementById('password').value;
            if (!id || !password) {
                alert("Please fill in all fields!");
                return;
            }
            let email = id.includes('@') ? id : id.toLowerCase().trim() + "@gamerzos.com";
            
            if (mode === 'login') {
                auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message));
            } else {
                auth.createUserWithEmailAndPassword(email, password).then(cred => {
                    db.collection("users").doc(cred.user.uid).set({
                        nickname: id.includes('@') ? id.split('@')[0] : id,
                        rank: "Member",
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }).catch(err => alert(err.message));
            }
        }

        // Password reset
        function sendResetEmail() {
            const id = document.getElementById('login-id').value.trim();
            if (!id) return alert("Enter your nickname/email first!");
            let email = id.includes('@') ? id : id.toLowerCase().trim() + "@gamerzos.com";
            auth.sendPasswordResetEmail(email).then(() => alert("Recovery email sent!")).catch(err => alert(err.message));
        }

        // Logout
        function logout() {
            auth.signOut().then(() => {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('launcher-screen').style.display = 'none';
            });
        }

        // Launch game - NO POPUP
        function launchGame() {
            const versionFile = document.getElementById('version').value;
            window.open(versionFile, '_blank');
        }

        // Update UI with user data
        function updateUI(userData) {
            document.getElementById('user-nickname').innerText = userData.nickname || 'User';
            const rank = userData.rank || 'Member';
            const rankBadge = document.getElementById('rank-badge');
            rankBadge.innerText = `[${rank.toUpperCase()}]`;
            rankBadge.className = 'rank-tag';
            if (rank === 'Owner') rankBadge.classList.add('rank-owner');
            if (rank === 'Admin') rankBadge.classList.add('rank-admin');
            if (rank === 'VIP') rankBadge.classList.add('rank-vip');
        }

        // Set download link (you'll need to replace this with your actual ZIP file URL)
        // Upload your launcher ZIP to Google Drive or GitHub, then put the link here
        // For now, it's a placeholder
        document.getElementById('downloadLauncherLink').href = 'https://drive.google.com/uc?export=download&id=1ucGSzFP6XQeJEh9WcA3GiDhBd_-eFnpj';

        // Auth state listener
        auth.onAuthStateChanged(async user => {
            if (user) {
                // Special case for owner email
                if (user.email === 'liamdunleavy.club@gmail.com') {
                    await db.collection("users").doc(user.uid).set({ rank: "Owner", nickname: "The_GamerZ" }, { merge: true });
                }
                
                // Load user data
                const doc = await db.collection("users").doc(user.uid).get();
                if (doc.exists) {
                    currentUserData = doc.data();
                } else {
                    currentUserData = { nickname: user.email.split('@')[0], rank: "Member" };
                    await db.collection("users").doc(user.uid).set(currentUserData);
                }
                
                // Update UI
                updateUI(currentUserData);
                
                // Hide login, show launcher
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('launcher-screen').style.display = 'block';
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('launcher-screen').style.display = 'none';
            }
        });
    </script>
</body>
</html>
